services:
  vinyl-vault-web:
    image: git.gsaraiva.com.br/gsaraiva2109/vinyl-vault-web:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_ISSUER: ${OIDC_ISSUER}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
