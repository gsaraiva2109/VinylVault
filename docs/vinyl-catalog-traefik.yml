http:
  middlewares:
    vinyl-api-cors:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "PATCH"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "Authorization"
          - "Content-Type"
        accessControlAllowOriginList:
          - "https://vinyl.gsaraiva.com.br"
        accessControlMaxAge: 100
        addVaryHeader: true

  routers:
    # 1. Frontend Router (Protected by Authentik Shield)
    vinyl-frontend-router:
      rule: "Host(`vinyl.gsaraiva.com.br`)"
      entryPoints: ["web"]
      # Order matters: fix headers FIRST, then auth
      middlewares:
        - "authentik-proto-fix@file"
        - "authentik-forward-auth@file"
      service: "vinyl-frontend-service"

    # 2. API Router (Protected by internal JWT validation)
    vinyl-api-router:
      rule: "Host(`api-vinyl.gsaraiva.com.br`)"
      entryPoints: ["web"]
      # Higher priority beats Dokploy's auto-generated router for the same host
      priority: 100
      # proto-fix so JWT validation works; cors middleware handles preflight
      middlewares:
        - "authentik-proto-fix@file"
        - "vinyl-api-cors@file"
      service: "vinyl-api-service"

  services:
    vinyl-frontend-service:
      loadBalancer:
        servers:
          # Use the exact Service Name defined in Dokploy
          - url: "http://prod-vinylcatalog-3fuo1w-vinyl-catalog-web-1:3000"

    vinyl-api-service:
      loadBalancer:
        servers:
          # Use the exact Service Name defined in Dokploy
          - url: "http://prod-vinylcatalogapi-z2d2bg-vinyl-catalog-api-1:3001"
