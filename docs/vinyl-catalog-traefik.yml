http:
  routers:
    # 1. Frontend Router (Protected by Authentik Shield)
    vinyl-frontend-router:
      rule: "Host(`vinyl.gsaraiva.com.br`)"
      entryPoints: ["web"]
      # Order matters: fix headers FIRST, then auth
      middlewares: 
        - "authentik-proto-fix@file"
        - "authentik-forward-auth@file"
      service: "vinyl-frontend-service"

    # 2. API Router (Protected by internal JWT validation)
    vinyl-api-router:
      rule: "Host(`api-vinyl.gsaraiva.com.br`)"
      entryPoints: ["web"]
      # We ONLY apply the proto-fix here so Authentik/CORS checks pass.
      # We do NOT apply forward-auth because the API uses Bearer tokens.
      middlewares:
        - "authentik-proto-fix@file"
      service: "vinyl-api-service"

  services:
    vinyl-frontend-service:
      loadBalancer:
        servers:
          # Use the exact Service Name defined in Dokploy
          - url: "http://prod-vinylcatalog-3fuo1w-vinyl-catalog-web-1:3000"

    vinyl-api-service:
      loadBalancer:
        servers:
          # Use the exact Service Name defined in Dokploy
          - url: "http://prod-vinylcatalogapi-z2d2bg-vinyl-catalog-api-1:3001"
