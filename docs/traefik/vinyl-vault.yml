# NOTE: This is a homelab-specific Traefik configuration example.
# Adapt hostnames, entrypoints, service URLs, and middleware names to your setup.
http:
  middlewares:
    vinyl-api-cors:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "PATCH"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "Authorization"
          - "Content-Type"
        accessControlAllowOriginList:
          - "https://vinyl.gsaraiva.com.br"
          - "http://localhost:3000"
          - "tauri://localhost"
        accessControlMaxAge: 100
        addVaryHeader: true

  routers:
    vinyl-frontend-router:
      rule: "Host(`vinyl.gsaraiva.com.br`)"
      entryPoints: ["web"]
      middlewares:
        - "authentik-proto-fix@file"
      service: "vinyl-frontend-service"

    vinyl-api-router:
      rule: "Host(`api-vinyl.gsaraiva.com.br`)"
      entryPoints: ["web"]
      priority: 100
      middlewares:
        - "authentik-proto-fix@file"
        - "vinyl-api-cors@file"
      service: "vinyl-api-service"

  services:
    vinyl-frontend-service:
      loadBalancer:
        servers:
          - url: "http://prod-vinylcatalog-3fuo1w-vinyl-vault-web-1:3000"

    vinyl-api-service:
      loadBalancer:
        servers:
          - url: "http://prod-vinylcatalogapi-z2d2bg-vinyl-vault-api-1:3001"
