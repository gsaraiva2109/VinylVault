<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background: dark charcoal -->
  <rect width="1024" height="1024" rx="180" fill="#1a1a1a"/>
  <!-- Outer vinyl circle -->
  <circle cx="512" cy="512" r="420" fill="#2a2a2a" stroke="#e2e8f0" stroke-width="24"/>
  <!-- Groove ring 1 -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#3a3a3a" stroke-width="12"/>
  <!-- Groove ring 2 -->
  <circle cx="512" cy="512" r="260" fill="none" stroke="#3a3a3a" stroke-width="12"/>
  <!-- Arc top-left (from original icon: path d="M6 12c0-1.7.7-3.2 1.8-4.2") — scaled arc -->
  <path d="M 230 512 A 290 290 0 0 1 335 336" fill="none" stroke="#e2e8f0" stroke-width="36" stroke-linecap="round"/>
  <!-- Arc bottom-right -->
  <path d="M 794 512 A 290 290 0 0 1 689 688" fill="none" stroke="#e2e8f0" stroke-width="36" stroke-linecap="round"/>
  <!-- Label area -->
  <circle cx="512" cy="512" r="160" fill="#111111"/>
  <!-- Center hole -->
  <circle cx="512" cy="512" r="48" fill="#1a1a1a"/>
  <!-- Center ring highlight -->
