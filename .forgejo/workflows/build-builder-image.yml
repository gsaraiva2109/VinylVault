name: Build Builder Image

# Rebuilds the CI builder image when the Dockerfile changes.
# After this runs, build-linux.yml can use:
#   container: git.gsaraiva.com.br/gsaraiva2109/vinyl-vault-builder:latest
# in build-tauri-linux to skip apt-get and Rust install entirely.
on:
  push:
    paths:
      - 'docker/builder.Dockerfile'
    branches: [main, dev]
  workflow_dispatch: {}

jobs:
  build-builder-image:
    name: Build & Push Builder Image
    runs-on: heavy-ubuntu
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use a builder that can push to localhost (insecure registry)
          driver-opts: network=host

      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/builder.Dockerfile
          push: true
          tags: localhost:5000/vinyl-vault-builder:latest
          # Layer cache stored locally — no Cloudflare in the path
          cache-from: type=registry,ref=localhost:5000/vinyl-vault-builder:cache
          cache-to: type=registry,ref=localhost:5000/vinyl-vault-builder:cache,mode=max
