name: Build Linux

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality Gate ──────────────────────────────────────────────────────────
  # Frontend lint + typecheck, backend typecheck/build, cargo check.
  # All downstream jobs are blocked on this passing.
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('vinylRecognizerDashboard/pnpm-lock.yaml', 'vinyl-catalog/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ── Next.js frontend ────────────────────────────────────────────────
      - name: Install Next.js deps
        working-directory: vinylRecognizerDashboard
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: vinylRecognizerDashboard
        run: pnpm lint

      - name: TypeScript check
        working-directory: vinylRecognizerDashboard
        run: pnpm exec tsc --noEmit

      # ── Backend API ─────────────────────────────────────────────────────
      - name: Install backend deps
        working-directory: vinyl-catalog/backend
        run: npm ci

      - name: Backend typecheck
        working-directory: vinyl-catalog/backend
        run: npx tsc --noEmit

      - name: Backend build
        working-directory: vinyl-catalog/backend
        run: npm run build

      # ── Rust / Tauri ────────────────────────────────────────────────────
      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Install Linux system deps for cargo check
        run: |
          apt-get update
          apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          apt-get clean
          rm -rf /var/lib/apt/lists/*

      - name: Create dummy sidecar for cargo check
        run: |
          mkdir -p vinyl-catalog/src-tauri/binaries
          touch vinyl-catalog/src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu
          chmod +x vinyl-catalog/src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu

      - name: Cargo check
        working-directory: vinyl-catalog/src-tauri
        env:
          AUTHENTIK_ISSUER: ${{ secrets.AUTHENTIK_ISSUER }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          # Route debug artifacts to /tmp — keeps workspace disk free
          CARGO_TARGET_DIR: /tmp/cargo-target
          # Limit linker parallelism to avoid SIGBUS under memory pressure
          CARGO_BUILD_JOBS: '2'
        run: cargo check --no-default-features

  # ── Docker Build & Push ───────────────────────────────────────────────────
  # Builds and pushes vinyl-vault-api and vinyl-vault-web images to GHCR.
  # Uses BuildX + registry cache for fast incremental builds.
  # DATABASE_URL is NEVER passed — no CI/CD DB connections.
  build-and-push-images:
    name: Build & Push — ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: quality-gate
    if: startsWith(github.ref, 'refs/tags/v')

    strategy:
      fail-fast: false
      matrix:
        include:
          - context: vinyl-catalog/backend
            image: vinyl-vault-api
            has_api_url: 'false'
          - context: vinylRecognizerDashboard
            image: vinyl-vault-web
            has_api_url: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Determine version type
        id: version_type
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" =~ -(beta|alpha|rc)\. ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_OWNER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && steps.version_type.outputs.is_prerelease == 'false' }}
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/v') && steps.version_type.outputs.is_prerelease == 'true' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Resolve build args
        id: build_args
        run: |
          if [ "${{ matrix.has_api_url }}" = "true" ]; then
            echo "args=NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ steps.build_args.outputs.args }}
            VERSION=${{ steps.version.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}:cache,mode=max

      - name: Summary
        run: |
          echo "## ${{ matrix.image }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.meta.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ── Mirror to GitHub + Create Release ───────────────────────────────────
  # Runs after all build jobs pass.
  # 1. Pushes the branch commit first (so GitHub has the code), then the tag.
  # 2. Creates the GitHub Release and uploads the Linux AppImage built above.
  # The macOS .dmg is then attached by release-macos.yml on GitHub Actions.
  # Requires MIRROR_TOKEN secret (repo + workflow scopes) and MIRROR_REPO
  # variable ("gsaraiva2109/vinylvault") configured on Forgejo.
  push-to-github:
    name: Mirror to GitHub + Create Release
    runs-on: ubuntu-latest
    needs: [quality-gate, build-and-push-images, build-tauri-linux]
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      needs.quality-gate.result == 'success' &&
      needs.build-and-push-images.result == 'success' &&
      needs.build-tauri-linux.result == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror branch + tag to GitHub
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.MIRROR_REPO }}
        run: |
          git fetch --tags
          git remote add github "https://x-access-token:${MIRROR_TOKEN}@github.com/${MIRROR_REPO}.git"
          # Always push the branch first so the commit exists on GitHub before we push the tag.
          # Without this, GitHub has no code to check out and the macOS build fails.
          git push github HEAD:refs/heads/main
          git push github "${GITHUB_REF}"

      - name: Download AppImage artifact
        uses: actions/download-artifact@v3
        with:
          name: vinyl-vault-linux-appimage
          path: dist/

      - name: Create GitHub Release and upload AppImage
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.MIRROR_REPO }}
        run: |
          TAG="${{ github.ref_name }}"
          APPIMAGE=$(find dist/ -name "*.AppImage" | head -1)
          APPIMAGE_NAME=$(basename "$APPIMAGE")

          # Generate SHA256 checksum for the AppImage
          sha256sum "$APPIMAGE" > SHA256SUMS.txt
          cat SHA256SUMS.txt

          # Install instructions prepended to auto-generated changelog.
          # GitHub appends the commit-based notes after the body when
          # generate_release_notes is true.
          RELEASE_BODY="### Install

**Linux (x86_64)** — download the \`.AppImage\` below:
\`\`\`bash
chmod +x Vinyl.Vault_*.AppImage
./Vinyl.Vault_*.AppImage
\`\`\`

**macOS (Apple Silicon)** — download the \`.dmg\`, open it, drag to Applications.
> The app is unsigned. Right-click → Open on first launch to bypass Gatekeeper.

---"

          # Create the release with auto-generated notes appended.
          # If it already exists (422 from a retry), fetch the existing ID.
          PAYLOAD=$(python3 -c "
import json, sys
body = sys.stdin.read()
print(json.dumps({
  'tag_name': '${TAG}',
  'name': 'Vinyl Vault ${TAG}',
  'body': body,
  'generate_release_notes': True
}))" <<< "$RELEASE_BODY")

          RESP=$(curl -s -o /tmp/release.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${MIRROR_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${MIRROR_REPO}/releases" \
            -d "$PAYLOAD")

          if [ "$RESP" = "422" ]; then
            RELEASE_ID=$(curl -s \
              -H "Authorization: Bearer ${MIRROR_TOKEN}" \
              "https://api.github.com/repos/${MIRROR_REPO}/releases/tags/${TAG}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          else
            RELEASE_ID=$(python3 -c "import json; print(json.load(open('/tmp/release.json'))['id'])")
          fi

          upload() {
            local FILE="$1" NAME="$2" TYPE="$3"
            curl -s -X POST \
              -H "Authorization: Bearer ${MIRROR_TOKEN}" \
              -H "Content-Type: ${TYPE}" \
              "https://uploads.github.com/repos/${MIRROR_REPO}/releases/${RELEASE_ID}/assets?name=${NAME}" \
              --data-binary @"$FILE"
            echo "Uploaded ${NAME}"
          }

          upload "$APPIMAGE"    "$APPIMAGE_NAME"          "application/octet-stream"
          upload SHA256SUMS.txt "SHA256SUMS.txt"           "text/plain"

  # ── Tauri Linux AppImage ──────────────────────────────────────────────────
  # Compiles the full Tauri desktop app for Linux x86_64, including the
  # Python OCR sidecar. Artifact stored on Forgejo for 30 days.
  build-tauri-linux:
    name: Build Tauri Linux AppImage
    runs-on: ubuntu-latest
    needs: quality-gate
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('vinylRecognizerDashboard/pnpm-lock.yaml', 'vinyl-catalog/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      # ── System deps ───────────────────────────────────────────────────────
      - name: Install Linux system deps
        run: |
          apt-get update
          apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file \
            python3 \
            python3-pip \
            python3-venv \
            libpython3.10 \
            xdg-utils
          apt-get clean
          rm -rf /var/lib/apt/lists/*

      # ── Frontend + Tauri deps ─────────────────────────────────────────────
      - name: Install Next.js deps
        working-directory: vinylRecognizerDashboard
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI deps
        working-directory: vinyl-catalog
        run: pnpm install --frozen-lockfile

      # ── Python OCR sidecar ────────────────────────────────────────────────
      - name: Build Python sidecar
        working-directory: vinyl-catalog/sidecar
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet -r requirements.txt pyinstaller
          .venv/bin/pyinstaller --clean --onefile --name sidecar \
            --distpath ../src-tauri/binaries main.py
          mv ../src-tauri/binaries/sidecar \
             ../src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu

      # ── Tauri build ───────────────────────────────────────────────────────
      - name: Build Tauri AppImage
        working-directory: vinyl-catalog
        env:
          AUTHENTIK_ISSUER: ${{ secrets.AUTHENTIK_ISSUER }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Skip bundling GStreamer media drivers — not needed for this app
          APPIMAGE_BUNDLE_GSTREAMER: '0'
        run: pnpm tauri build --target x86_64-unknown-linux-gnu

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v3
        with:
          name: vinyl-vault-linux-appimage
          path: vinyl-catalog/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          retention-days: 30
