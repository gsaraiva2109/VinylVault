name: Build Linux

on:
  push:
    branches: [main, dev]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Change Detection ──────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: light-node
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0
      - uses: https://github.com/dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'web/**'
              - 'pnpm-lock.yaml'
            backend:
              - 'api/**'
              - 'pnpm-lock.yaml'
            rust:
              - 'desktop/src-tauri/**'
              - 'desktop/sidecar/**'
              - 'desktop/package.json'
            ci:
              - '.forgejo/workflows/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'Dockerfile'
              - '**/Dockerfile'
              - '.dockerignore'
              - '**/ .dockerignore'

  # ── Quality Gate: Frontend ────────────────────────────────────────────────
  check-frontend:
    name: Check Frontend
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: light-node
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - name: Cache pnpm store
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-frontend-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-frontend-
      - name: Install Next.js deps
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: web
        run: pnpm lint
      - name: TypeScript check
        working-directory: web
        run: pnpm exec tsc --noEmit

  # ── Quality Gate: Backend ─────────────────────────────────────────────────
  check-backend:
    name: Check Backend
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: light-node
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Install backend deps
        working-directory: api
        run: pnpm install --frozen-lockfile
      - name: Backend typecheck
        working-directory: api
        run: pnpm exec tsc --noEmit
      - name: Backend build
        working-directory: api
        run: pnpm run build

  # ── Quality Gate: Rust / Tauri ────────────────────────────────────────────
  check-rust:
    name: Check Rust
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rust == 'true' || needs.detect-changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: heavy-ubuntu
    container: localhost:5000/vinyl-vault-builder:latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
      - name: Cache cargo registry
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-check-reg-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-reg-
      - name: Cache cargo target
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: /tmp/cargo-target
          key: ${{ runner.os }}-cargo-check-target-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-target-
      - name: Cargo check
        working-directory: desktop/src-tauri
        env:
          OIDC_ISSUER: ${{ secrets.OIDC_ISSUER }}
          OIDC_CLIENT_ID: ${{ secrets.OIDC_CLIENT_ID }}
          OIDC_CLIENT_SECRET: ${{ secrets.OIDC_CLIENT_SECRET }}
          CARGO_TARGET_DIR: /tmp/cargo-target
          CARGO_BUILD_JOBS: '16'
        run: cargo check --no-default-features

  # ── Semantic Release ─────────────────────────────────────────────────────
  release:
    name: Semantic Release
    runs-on: light-node
    needs: [detect-changes, check-frontend, check-backend, check-rust]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.result != 'skipped' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    outputs:
      released: ${{ steps.sr.outputs.new_release_published }}
      version: ${{ steps.sr.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0
      - name: Cache npm store
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-semantic-release-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-semantic-release-
      - name: Install semantic-release deps
        run: npm install
      - name: Run semantic-release
        id: sr
        env:
          GITEA_TOKEN: ${{ secrets.FGJ_TOKEN }}
          GITEA_URL: https://git.gsaraiva.com.br
        run: |
          BEFORE=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          npx semantic-release
          git fetch --tags
          AFTER=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$AFTER" ] && [ "$BEFORE" != "$AFTER" ]; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=${AFTER#v}" >> $GITHUB_OUTPUT
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
          fi

  # ── Docker Build & Push ───────────────────────────────────────────────────
  build-and-push-images:
    name: Build & Push — ${{ matrix.image }}
    runs-on: ${{ matrix.runner }}
    needs: [detect-changes, check-frontend, check-backend, check-rust, release]
    if: ${{ always() && needs.detect-changes.result != 'skipped' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || (github.ref == 'refs/heads/dev' && needs.detect-changes.outputs.ci == 'true')) && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - context: api
            image: vinyl-vault-api
            filter: backend
            has_api_url: 'false'
            runner: light-ubuntu
          - context: web
            image: vinyl-vault-web
            filter: frontend
            has_api_url: 'true'
            runner: heavy-ubuntu
    steps:
      - name: Check if image needs building
        id: check_skip
        run: |
          if [[ "${{ needs.detect-changes.outputs[matrix.filter] }}" != 'true' ]] && [[ "${{ needs.detect-changes.outputs.ci }}" != 'true' ]] && [[ "${{ needs.release.outputs.released }}" != 'true' ]]; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        if: steps.check_skip.outputs.SKIP != 'true'
        with:
          ref: ${{ needs.release.outputs.released == 'true' && format('refs/tags/v{0}', needs.release.outputs.version) || github.ref }}

      - name: Read version
        if: steps.check_skip.outputs.SKIP != 'true'
        id: version
        run: |
          if [[ "${{ needs.release.outputs.released }}" == "true" ]]; then
            echo "version=${{ needs.release.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check_skip.outputs.SKIP != 'true'
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to Forgejo Registry
        if: steps.check_skip.outputs.SKIP != 'true'
        uses: docker/login-action@v3
        with:
          registry: git.gsaraiva.com.br
          username: ${{ github.repository_owner }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        if: steps.check_skip.outputs.SKIP != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: git.gsaraiva.com.br/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ needs.release.outputs.released == 'true' && !contains(steps.version.outputs.version, '-') }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ needs.release.outputs.released == 'true' }}

      - name: Resolve build args
        if: steps.check_skip.outputs.SKIP != 'true'
        id: build_args
        run: |
          if [ "${{ matrix.has_api_url }}" = "true" ]; then
            echo "args=NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        if: steps.check_skip.outputs.SKIP != 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ steps.build_args.outputs.args }}
            VERSION=${{ steps.version.outputs.version }}
            COMMIT_SHA=${{ github.sha }}

      - name: Trigger Dokploy Deploy
        if: steps.check_skip.outputs.SKIP != 'true' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        env:
          WEBHOOK_PATH: ${{ matrix.image == 'vinyl-vault-api' && secrets.DOKPLOY_WEBHOOK_URL_API || secrets.DOKPLOY_WEBHOOK_URL_WEB }}
          DOKPLOY_HOST: ${{ vars.INTERNAL_DOKPLOY_HOST }}
        run: |
          if [ -n "$WEBHOOK_PATH" ]; then
            # If WEBHOOK_PATH is already a full URL, use it directly.
            # Otherwise prepend DOKPLOY_HOST (internal Dokploy address).
            if echo "$WEBHOOK_PATH" | grep -q '^https\?://'; then
              WEBHOOK_URL="$WEBHOOK_PATH"
            else
              WEBHOOK_URL="${DOKPLOY_HOST}${WEBHOOK_PATH}"
            fi
            echo "Triggering Dokploy deploy for ${{ matrix.image }} → $WEBHOOK_URL"
            curl -k -L --post301 -X POST \
              -H "Content-Type: application/json" \
              -d "{}" \
              "$WEBHOOK_URL"
          else
            echo "::warning::Dokploy webhook URL not configured for ${{ matrix.image }}."
          fi

  # ── Tauri Linux AppImage ──────────────────────────────────────────────────
  build-tauri-linux:
    name: Build Tauri Linux AppImage
    runs-on: heavy-ubuntu
    # Rust, system libs, and Python are pre-baked in the builder image stored
    # on the local homelab registry (bypasses Cloudflare 413 limit).
    container: localhost:5000/vinyl-vault-builder:latest
    needs: [detect-changes, check-frontend, check-backend, check-rust, release]
    if: |
      always() &&
      needs.detect-changes.result != 'skipped' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.release.outputs.released == 'true' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          ref: ${{ needs.release.outputs.released == 'true' && format('refs/tags/v{0}', needs.release.outputs.version) || github.ref }}

      - name: Set release version in workspace
        if: needs.release.outputs.released == 'true'
        run: bash scripts/sr-bump-version.sh ${{ needs.release.outputs.version }}

      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-build-${{ hashFiles('web/pnpm-lock.yaml', 'desktop/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-build-

      # Rust and system libs are in the builder image — only compiled artefacts need caching.
      - name: Cache cargo registry
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-build-reg-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-reg-

      - name: Cache cargo target
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Install Next.js deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Fix Next.js static export for Tauri
        run: |
          # Next.js 15 requires force-static for routes during static export.
          # We sed this at build time so the Web version stays dynamic.
          sed -i 's/force-dynamic/force-static/' web/app/api/auth/\[...nextauth\]/route.ts

      - name: Build Tauri AppImage
        working-directory: desktop
        env:
          OIDC_ISSUER: ${{ secrets.OIDC_ISSUER }}
          OIDC_CLIENT_ID: ${{ secrets.OIDC_CLIENT_ID }}
          OIDC_CLIENT_SECRET: ${{ secrets.OIDC_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          APPIMAGE_BUNDLE_GSTREAMER: '0'
        run: pnpm tauri build --target x86_64-unknown-linux-gnu

      - name: Verify build artifacts
        run: |
          echo "Checking build output directory..."
          find desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/ -type f \( -name "*.AppImage" -o -name "*.tar.gz" -o -name "*.sig" \)

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v3
        with:
          name: vinyl-vault-linux-appimage
          path: |
            desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.tar.gz
            desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.sig
          retention-days: 30

  # ── Mirror Release to GitHub ────────────────────────────────────────────
  # Runs immediately after semantic-release so every version gets a GitHub
  # release even if Tauri build fails or the workflow is delayed.
  mirror-github-release:
    name: Mirror Release to GitHub
    runs-on: light-ubuntu
    needs: [release]
    if: ${{ needs.release.outputs.released == 'true' }}
    outputs:
      release-id: ${{ steps.mirror.outputs.release_id }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0
          ref: refs/tags/v${{ needs.release.outputs.version }}

      - name: Create GitHub release
        id: mirror
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.MIRROR_REPO }}
        run: |
          TAG="v${{ needs.release.outputs.version }}"
          VERSION="${{ needs.release.outputs.version }}"

          GITEA_API_URL="https://git.gsaraiva.com.br/api/v1/repos/${{ github.repository }}/releases/tags/${TAG}"
          RAW_CHANGELOG=$(curl -s "$GITEA_API_URL" | jq -r '.body // empty')
          RELEASE_BODY=$(printf '# Vinyl Vault v%s\n\n%s\n\n---\n\n## 📥 Install\n\n### Linux (x86_64)\n\nDownload the `.AppImage` below:\n\n```sh\nchmod +x Vinyl.Vault_*.AppImage\n./Vinyl.Vault_*.AppImage\n```\n\n### macOS (Apple Silicon)\n\nDownload the `.dmg` below, open it, and drag Vinyl Vault to your Applications folder. Then remove the quarantine flag so macOS allows the unsigned app to launch:\n\n```sh\nxattr -cr /Applications/Vinyl\\ Vault.app\n```\n' "$VERSION" "$RAW_CHANGELOG")
          CHANGELOG_JSON=$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" <<< "$RELEASE_BODY")

          FETCH_RESP=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${MIRROR_TOKEN}" \
            "https://api.github.com/repos/${MIRROR_REPO}/releases/tags/${TAG}")
          FETCH_HTTP=$(echo "$FETCH_RESP" | tail -1)
          FETCH_BODY=$(echo "$FETCH_RESP" | head -n -1)
          RELEASE_ID=$(echo "$FETCH_BODY" | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            echo "GitHub release ${TAG} not found (HTTP $FETCH_HTTP) — creating it..."
            CREATE_RESP=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${MIRROR_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${MIRROR_REPO}/releases" \
              -d "{\"tag_name\":\"${TAG}\",\"name\":\"Vinyl Vault ${TAG}\",\"target_commitish\":\"main\",\"body\":${CHANGELOG_JSON},\"draft\":false,\"prerelease\":false}")
            CREATE_HTTP=$(echo "$CREATE_RESP" | tail -1)
            CREATE_BODY=$(echo "$CREATE_RESP" | head -n -1)
            RELEASE_ID=$(echo "$CREATE_BODY" | jq -r '.id // empty')
            echo "Create release HTTP $CREATE_HTTP — body: $CREATE_BODY"
          fi

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "::error::Failed to get or create GitHub release ${TAG}"
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"
          echo "release_id=${RELEASE_ID}" >> $GITHUB_OUTPUT

      - name: Dispatch macOS build
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.MIRROR_REPO }}
        run: |
          TAG="v${{ needs.release.outputs.version }}"
          echo "Dispatching release-macos workflow for tag ${TAG}..."
          DISPATCH_RESP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${MIRROR_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${MIRROR_REPO}/dispatches" \
            -d "{\"event_type\":\"release-macos\",\"client_payload\":{\"tag\":\"${TAG}\"}}")
          echo "Dispatch response: HTTP $DISPATCH_RESP"
          if [ "$DISPATCH_RESP" != "204" ]; then
            echo "::warning::macOS dispatch returned HTTP $DISPATCH_RESP — check MIRROR_TOKEN has workflow scope"
          fi

  # ── Upload Tauri Assets to GitHub Release ───────────────────────────────
  # Depends on the Tauri build completing. Uploads AppImage, updater bundle,
  # signature, and latest.json to the GitHub release created above.
  upload-release-assets:
    name: Upload Tauri Assets
    runs-on: light-ubuntu
    needs: [build-tauri-linux, release, mirror-github-release]
    if: ${{ needs.build-tauri-linux.result == 'success' && needs.mirror-github-release.result == 'success' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0
          ref: refs/tags/v${{ needs.release.outputs.version }}

      - name: Download AppImage artifact
        uses: actions/download-artifact@v3
        with:
          name: vinyl-vault-linux-appimage
          path: dist/

      - name: Upload assets to GitHub release
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.MIRROR_REPO }}
          RELEASE_ID: ${{ needs.mirror-github-release.outputs.release-id }}
        run: |
          TAG="v${{ needs.release.outputs.version }}"
          VERSION="${{ needs.release.outputs.version }}"

          echo "DEBUG: Listing files in dist/:"
          ls -R dist/

          # Rename: "Vinyl Vault_*" → "Vinyl.Vault_*" (spaces → dots)
          find dist/ -type f | while IFS= read -r f; do
            new="$(echo "$f" | sed 's/ /./g')"
            [ "$f" != "$new" ] && mv "$f" "$new"
          done

          APPIMAGE=$(find dist/ -type f -name "*.AppImage" | head -1)
          UPDATER_BUNDLE=$(find dist/ -type f -name "*.tar.gz" | head -1)
          SIG_FILE=$(find dist/ -type f -name "*.sig" | head -1)

          if [ -z "$APPIMAGE" ]; then
            echo "::error::No raw AppImage found in dist/"
            exit 1
          fi
          if [ -z "$UPDATER_BUNDLE" ]; then
            UPDATER_BUNDLE="$APPIMAGE"
            echo "No .tar.gz found; using AppImage directly as updater bundle (Tauri v2 direct signing)"
          fi
          if [ -z "$SIG_FILE" ]; then
            echo "::error::No .sig found in dist/ — ensure TAURI_SIGNING_PRIVATE_KEY is set"
            exit 1
          fi

          APPIMAGE_NAME=$(basename "$APPIMAGE")
          UPDATER_NAME=$(basename "$UPDATER_BUNDLE")
          SIG_NAME=$(basename "$SIG_FILE")

          sha256sum "$APPIMAGE" > SHA256SUMS.txt
          if [ "$UPDATER_BUNDLE" != "$APPIMAGE" ]; then
            sha256sum "$UPDATER_BUNDLE" >> SHA256SUMS.txt
          fi

          # URL-encode asset name (productName is "Vinyl Vault" — contains a space)
          upload_asset() {
            local file="$1" display_name="$2" content_type="$3"
            local encoded_name
            encoded_name=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$display_name")
            RESP=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${MIRROR_TOKEN}" \
              -H "Content-Type: ${content_type}" \
              "https://uploads.github.com/repos/${MIRROR_REPO}/releases/${RELEASE_ID}/assets?name=${encoded_name}" \
              --data-binary @"${file}")
            HTTP=$(echo "$RESP" | tail -1)
            echo "Uploaded ${display_name}: HTTP $HTTP"
            if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
              echo "::error::Upload failed for ${display_name}: $(echo "$RESP" | head -n -1)"
              return 1
            fi
          }
          upload_asset "$APPIMAGE" "$APPIMAGE_NAME" "application/octet-stream"
          if [ "$UPDATER_BUNDLE" != "$APPIMAGE" ]; then
            upload_asset "$UPDATER_BUNDLE" "$UPDATER_NAME" "application/gzip"
          fi
          upload_asset "$SIG_FILE" "$SIG_NAME" "text/plain"
          upload_asset SHA256SUMS.txt "SHA256SUMS.txt" "text/plain"

          # ── Generate latest.json for Tauri auto-updater ───────────────────
          SIGNATURE=$(cat "$SIG_FILE")
          DOWNLOAD_URL="https://github.com/${MIRROR_REPO}/releases/download/${TAG}/${UPDATER_NAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg version   "$VERSION" \
            --arg notes     "See release notes on GitHub" \
            --arg pub_date  "$PUB_DATE" \
            --arg url       "$DOWNLOAD_URL" \
            --arg signature "$SIGNATURE" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "linux-x86_64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > latest.json

          echo "--- latest.json ---"
          cat latest.json

          upload_asset latest.json "latest.json" "application/json"

      - name: Update release body with SHA256 checksums
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.MIRROR_REPO }}
          RELEASE_ID: ${{ needs.mirror-github-release.outputs.release-id }}
        run: |
          CURRENT_BODY=$(curl -s -H "Authorization: Bearer ${MIRROR_TOKEN}" \
            "https://api.github.com/repos/${MIRROR_REPO}/releases/${RELEASE_ID}" | jq -r '.body // ""')
          SHA256_SECTION="### 🔐 SHA256 Checksums\n\n\`\`\`\n$(cat SHA256SUMS.txt)\n\`\`\`"
          UPDATED_BODY=$(printf "%s\n\n%s" "$CURRENT_BODY" "$SHA256_SECTION")
          UPDATED_BODY_JSON=$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" <<< "$UPDATED_BODY")
          curl -s -X PATCH \
            -H "Authorization: Bearer ${MIRROR_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${MIRROR_REPO}/releases/${RELEASE_ID}" \
            -d "{\"body\": ${UPDATED_BODY_JSON}}"