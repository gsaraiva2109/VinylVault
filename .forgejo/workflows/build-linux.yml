name: Build Linux

on:
  push:
    branches: [main, dev]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Change Detection ──────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: light-node
    # On a tag push the workflow fires once (correct).
    # On a branch push caused by a release commit the workflow also fires — skip it
    # here so the heavyweight jobs below are never duplicated.
    if: |
      startsWith(github.ref, 'refs/tags/') || 
      !startsWith(github.event.head_commit.message, 'chore: release v')
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0
      - uses: https://github.com/dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'vinylRecognizerDashboard/**'
              - 'pnpm-lock.yaml'
            backend:
              - 'vinyl-catalog/backend/**'
              - 'package-lock.json'
            rust:
              - 'vinyl-catalog/src-tauri/**'
              - 'vinyl-catalog/sidecar/**'
              - 'vinyl-catalog/package.json'
            ci:
              - '.forgejo/workflows/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'Dockerfile'
              - '**/Dockerfile'
              - '.dockerignore'
              - '**/ .dockerignore'

  # ── Quality Gate: Frontend ────────────────────────────────────────────────
  check-frontend:
    name: Check Frontend
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: light-node
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - name: Cache pnpm store
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-frontend-${{ hashFiles('vinylRecognizerDashboard/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-frontend-
      - name: Install Next.js deps
        working-directory: vinylRecognizerDashboard
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: vinylRecognizerDashboard
        run: pnpm lint
      - name: TypeScript check
        working-directory: vinylRecognizerDashboard
        run: pnpm exec tsc --noEmit

  # ── Quality Gate: Backend ─────────────────────────────────────────────────
  check-backend:
    name: Check Backend
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: light-node
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
      - name: Install backend deps
        working-directory: vinyl-catalog/backend
        run: npm ci
      - name: Backend typecheck
        working-directory: vinyl-catalog/backend
        run: npx tsc --noEmit
      - name: Backend build
        working-directory: vinyl-catalog/backend
        run: npm run build

  # ── Quality Gate: Rust / Tauri ────────────────────────────────────────────
  check-rust:
    name: Check Rust
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rust == 'true' || needs.detect-changes.outputs.ci == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: heavy-ubuntu
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
      - name: Cache Rust toolchain
        id: cache-rustup-check
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.rustup
            ~/.cargo/bin
          key: ${{ runner.os }}-rustup-stable
      - name: Install Rust stable
        if: steps.cache-rustup-check.outputs.cache-hit != 'true'
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      - name: Add cargo to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache cargo registry
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-check-reg-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-reg-
      - name: Cache cargo target
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: /tmp/cargo-target
          key: ${{ runner.os }}-cargo-check-target-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-target-
      - name: Cargo check
        working-directory: vinyl-catalog/src-tauri
        env:
          AUTHENTIK_ISSUER: ${{ secrets.AUTHENTIK_ISSUER }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          CARGO_TARGET_DIR: /tmp/cargo-target
          CARGO_BUILD_JOBS: '16'
        run: cargo check --no-default-features

  # ── Semantic Release ─────────────────────────────────────────────────────
  release:
    name: Semantic Release
    runs-on: light-node
    needs: [detect-changes, check-frontend, check-backend, check-rust]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.result != 'skipped' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    outputs:
      released: ${{ steps.sr.outputs.new_release_published }}
      version: ${{ steps.sr.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0
      - name: Cache npm store
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-semantic-release-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-semantic-release-
      - name: Install semantic-release deps
        run: npm install
      - name: Run semantic-release
        id: sr
        env:
          GITEA_TOKEN: ${{ secrets.FGJ_TOKEN }}
          GITEA_URL: https://git.gsaraiva.com.br
          GIT_AUTHOR_NAME: gsaraiva2109
          GIT_AUTHOR_EMAIL: gsaraiva2109@gmail.com
          GIT_COMMITTER_NAME: gsaraiva2109
          GIT_COMMITTER_EMAIL: gsaraiva2109@gmail.com
        run: npx semantic-release

  # ── Docker Build & Push ───────────────────────────────────────────────────
  build-and-push-images:
    name: Build & Push — ${{ matrix.image }}
    runs-on: ${{ matrix.runner }}
    needs: [detect-changes, check-frontend, check-backend, check-rust, release]
    if: ${{ always() && needs.detect-changes.result != 'skipped' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || (github.ref == 'refs/heads/dev' && needs.detect-changes.outputs.ci == 'true')) && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - context: vinyl-catalog/backend
            image: vinyl-vault-api
            filter: backend
            has_api_url: 'false'
            runner: light-ubuntu
          - context: vinylRecognizerDashboard
            image: vinyl-vault-web
            filter: frontend
            has_api_url: 'true'
            runner: heavy-ubuntu
    steps:
      - name: Check if image needs building
        id: check_skip
        run: |
          if [[ "${{ needs.detect-changes.outputs[matrix.filter] }}" != 'true' ]] && [[ "${{ needs.detect-changes.outputs.ci }}" != 'true' ]] && [[ "${{ needs.release.outputs.released }}" != 'true' ]]; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        if: steps.check_skip.outputs.SKIP != 'true'

      - name: Read version
        if: steps.check_skip.outputs.SKIP != 'true'
        id: version
        run: |
          if [[ "${{ needs.release.outputs.released }}" == "true" ]]; then
            echo "version=${{ needs.release.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check_skip.outputs.SKIP != 'true'
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to Forgejo Registry
        if: steps.check_skip.outputs.SKIP != 'true'
        uses: docker/login-action@v3
        with:
          registry: git.gsaraiva.com.br
          username: ${{ github.repository_owner }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        if: steps.check_skip.outputs.SKIP != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: git.gsaraiva.com.br/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ needs.release.outputs.released == 'true' && !contains(steps.version.outputs.version, '-') }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ needs.release.outputs.released == 'true' }}

      - name: Resolve build args
        if: steps.check_skip.outputs.SKIP != 'true'
        id: build_args
        run: |
          if [ "${{ matrix.has_api_url }}" = "true" ]; then
            echo "args=NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        if: steps.check_skip.outputs.SKIP != 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ steps.build_args.outputs.args }}
            VERSION=${{ steps.version.outputs.version }}
            COMMIT_SHA=${{ github.sha }}

      - name: Trigger Dokploy Deploy
        if: steps.check_skip.outputs.SKIP != 'true' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        env:
          WEBHOOK_URL: ${{ matrix.image == 'vinyl-vault-api' && secrets.DOKPLOY_WEBHOOK_URL_API || secrets.DOKPLOY_WEBHOOK_URL_WEB }}
          DOKPLOY_HOST: ${{ vars.INTERNAL_DOKPLOY_HOST }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            echo "Triggering Dokploy deploy for ${{ matrix.image }}..."
            # Combine Host + Webhook Path if needed, or just use the full URL if it's already an IP
            # We add -i to see response and -d '{}' to ensure POST body is present
            # Added -L and --post301 to follow redirects (301) while maintaining POST
            curl -i -L --post301 -X POST \
              -H "Content-Type: application/json" \
              -d "{}" \
              "$WEBHOOK_URL"
          else
            echo "::warning::Dokploy webhook URL not configured for ${{ matrix.image }}."
          fi

  # ── Tauri Linux AppImage ──────────────────────────────────────────────────
  build-tauri-linux:
    name: Build Tauri Linux AppImage
    runs-on: heavy-ubuntu
    # Rust, system libs, and Python are pre-baked in the builder image stored
    # on the local homelab registry (bypasses Cloudflare 413 limit).
    container: localhost:5000/vinyl-vault-builder:latest
    needs: [detect-changes, check-frontend, check-backend, check-rust, release]
    if: ${{ always() && needs.release.outputs.released == 'true' && needs.release.result == 'success' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-build-${{ hashFiles('vinylRecognizerDashboard/pnpm-lock.yaml', 'vinyl-catalog/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-build-

      # Rust and system libs are in the builder image — only compiled artefacts need caching.
      - name: Cache cargo registry
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-build-reg-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-reg-

      - name: Cache cargo target
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: vinyl-catalog/src-tauri/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Install Next.js deps
        working-directory: vinylRecognizerDashboard
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI deps
        working-directory: vinyl-catalog
        run: pnpm install --frozen-lockfile

      - name: Fix Next.js static export for Tauri
        run: |
          # Next.js 15 requires force-static for routes during static export.
          # We sed this at build time so the Web version stays dynamic.
          sed -i 's/force-dynamic/force-static/' vinylRecognizerDashboard/app/api/auth/\[...nextauth\]/route.ts

      - name: Build Tauri AppImage
        working-directory: vinyl-catalog
        env:
          AUTHENTIK_ISSUER: ${{ secrets.AUTHENTIK_ISSUER }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          NEXT_PUBLIC_SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          NEXT_PUBLIC_SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          APPIMAGE_BUNDLE_GSTREAMER: '0'
        run: pnpm tauri build --target x86_64-unknown-linux-gnu

      - name: Verify build artifacts
        run: |
          echo "Checking build output directory..."
          find vinyl-catalog/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/ -type f \( -name "*.AppImage" -o -name "*.tar.gz" -o -name "*.sig" \)

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v3
        with:
          name: vinyl-vault-linux-appimage
          path: |
            vinyl-catalog/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            vinyl-catalog/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.tar.gz
            vinyl-catalog/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.sig
          retention-days: 30

  # ── Upload Release Assets to GitHub ──────────────────────────────────────
  # GitHub release is created by semantic-release. This job uploads binary
  # artifacts (AppImage, updater bundle) and dispatches the macOS build.
  push-to-github:
    name: Upload Release Assets
    runs-on: light-ubuntu
    needs: [build-tauri-linux, release]
    if: ${{ needs.build-tauri-linux.result == 'success' && needs.release.outputs.released == 'true' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0

      - name: Download AppImage artifact
        uses: actions/download-artifact@v3
        with:
          name: vinyl-vault-linux-appimage
          path: dist/

      - name: Upload AppImage and dispatch macOS build
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.MIRROR_REPO }}
        run: |
          TAG="v${{ needs.release.outputs.version }}"
          VERSION="${{ needs.release.outputs.version }}"

          echo "DEBUG: Listing files in dist/:"
          ls -R dist/

          APPIMAGE=$(find dist/ -type f -name "*.AppImage" | head -1)
          UPDATER_BUNDLE=$(find dist/ -type f -name "*.tar.gz" | head -1)
          SIG_FILE=$(find dist/ -type f -name "*.sig" | head -1)

          if [ -z "$APPIMAGE" ]; then
            echo "::error::No raw AppImage found in dist/"
            exit 1
          fi
          if [ -z "$UPDATER_BUNDLE" ]; then
            UPDATER_BUNDLE="$APPIMAGE"
            echo "No .tar.gz found; using AppImage directly as updater bundle (Tauri v2 direct signing)"
          fi
          if [ -z "$SIG_FILE" ]; then
            echo "::error::No .sig found in dist/ — ensure TAURI_SIGNING_PRIVATE_KEY is set"
            exit 1
          fi

          APPIMAGE_NAME=$(basename "$APPIMAGE")
          UPDATER_NAME=$(basename "$UPDATER_BUNDLE")
          SIG_NAME=$(basename "$SIG_FILE")

          sha256sum "$APPIMAGE" > SHA256SUMS.txt
          if [ "$UPDATER_BUNDLE" != "$APPIMAGE" ]; then
            sha256sum "$UPDATER_BUNDLE" >> SHA256SUMS.txt
          fi

          # Get or create GitHub release
          RELEASE_ID=$(curl -sf \
            -H "Authorization: Bearer ${MIRROR_TOKEN}" \
            "https://api.github.com/repos/${MIRROR_REPO}/releases/tags/${TAG}" \
            | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            echo "GitHub release ${TAG} not found — creating it..."
            RELEASE_ID=$(curl -sf \
              -X POST \
              -H "Authorization: Bearer ${MIRROR_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${MIRROR_REPO}/releases" \
              -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"body\":\"See CHANGELOG.md for details.\",\"draft\":false,\"prerelease\":false}" \
              | jq -r '.id')
          fi

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "::error::Failed to get or create GitHub release ${TAG}"
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"

          # URL-encode asset name (productName is "Vinyl Vault" — contains a space)
          upload_asset() {
            local file="$1" display_name="$2" content_type="$3"
            local encoded_name
            encoded_name=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$display_name")
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${MIRROR_TOKEN}" \
              -H "Content-Type: ${content_type}" \
              "https://uploads.github.com/repos/${MIRROR_REPO}/releases/${RELEASE_ID}/assets?name=${encoded_name}" \
              --data-binary @"${file}")
            echo "Uploaded ${display_name}: HTTP $HTTP"
          }
          upload_asset "$APPIMAGE" "$APPIMAGE_NAME" "application/octet-stream"
          if [ "$UPDATER_BUNDLE" != "$APPIMAGE" ]; then
            upload_asset "$UPDATER_BUNDLE" "$UPDATER_NAME" "application/gzip"
          fi
          upload_asset "$SIG_FILE" "$SIG_NAME" "text/plain"
          upload_asset SHA256SUMS.txt "SHA256SUMS.txt" "text/plain"

          # ── Generate latest.json for Tauri auto-updater ───────────────────
          SIGNATURE=$(cat "$SIG_FILE")
          DOWNLOAD_URL="https://github.com/${MIRROR_REPO}/releases/download/${TAG}/${UPDATER_NAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg version   "$VERSION" \
            --arg notes     "See release notes on GitHub" \
            --arg pub_date  "$PUB_DATE" \
            --arg url       "$DOWNLOAD_URL" \
            --arg signature "$SIGNATURE" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "linux-x86_64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > latest.json

          echo "--- latest.json ---"
          cat latest.json

          upload_asset latest.json "latest.json" "application/json"

          # ── Trigger macOS release workflow ────────────────────────────────
          # GitHub release is guaranteed to exist (created by semantic-release above).
          echo "Dispatching release-macos workflow for tag ${TAG}..."
          DISPATCH_RESP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${MIRROR_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${MIRROR_REPO}/dispatches" \
            -d "{\"event_type\":\"release-macos\",\"client_payload\":{\"tag\":\"${TAG}\"}}")
          echo "Dispatch response: HTTP $DISPATCH_RESP"
          if [ "$DISPATCH_RESP" != "204" ]; then
            echo "::warning::macOS dispatch returned HTTP $DISPATCH_RESP — check MIRROR_TOKEN has workflow scope"
          fi