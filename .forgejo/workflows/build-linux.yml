name: Build Linux

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality Gate: Frontend ────────────────────────────────────────────────
  # Lint and Typecheck for the Next.js frontend.
  check-frontend:
    name: Check Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-frontend-${{ hashFiles('vinylRecognizerDashboard/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-frontend-

      - name: Install Next.js deps
        working-directory: vinylRecognizerDashboard
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: vinylRecognizerDashboard
        run: pnpm lint

      - name: TypeScript check
        working-directory: vinylRecognizerDashboard
        run: pnpm exec tsc --noEmit

  # ── Quality Gate: Backend ─────────────────────────────────────────────────
  # Typecheck and initial build for the Backend API.
  check-backend:
    name: Check Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2

      - name: Install backend deps
        working-directory: vinyl-catalog/backend
        run: npm ci

      - name: Backend typecheck
        working-directory: vinyl-catalog/backend
        run: npx tsc --noEmit

      - name: Backend build
        working-directory: vinyl-catalog/backend
        run: npm run build

  # ── Quality Gate: Rust / Tauri ────────────────────────────────────────────
  # Cargo check for the Tauri application.
  check-rust:
    name: Check Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo registry
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-check-reg-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-reg-

      - name: Cache cargo target
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: /tmp/cargo-target
          key: ${{ runner.os }}-cargo-check-target-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-target-

      - name: Install Linux system deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          apt-get clean
          rm -rf /var/lib/apt/lists/*

      - name: Create dummy sidecar
        run: |
          mkdir -p vinyl-catalog/src-tauri/binaries
          touch vinyl-catalog/src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu
          chmod +x vinyl-catalog/src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu

      - name: Cargo check
        working-directory: vinyl-catalog/src-tauri
        env:
          AUTHENTIK_ISSUER: ${{ secrets.AUTHENTIK_ISSUER }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          CARGO_TARGET_DIR: /tmp/cargo-target
          CARGO_BUILD_JOBS: '16'
        run: cargo check --no-default-features

  # ── Docker Build & Push ───────────────────────────────────────────────────
  # Builds and pushes vinyl-vault-api and vinyl-vault-web images to GHCR.
  build-and-push-images:
    name: Build & Push — ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [check-frontend, check-backend, check-rust]
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}

    strategy:
      fail-fast: true
      matrix:
        include:
          - context: vinyl-catalog/backend
            image: vinyl-vault-api
            has_api_url: 'false'
          - context: vinylRecognizerDashboard
            image: vinyl-vault-web
            has_api_url: 'true'

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Determine version type
        id: version_type
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" =~ -(beta|alpha|rc)\. ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_OWNER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && steps.version_type.outputs.is_prerelease == 'false' }}
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/v') && steps.version_type.outputs.is_prerelease == 'true' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Resolve build args
        id: build_args
        run: |
          if [ "${{ matrix.has_api_url }}" = "true" ]; then
            echo "args=NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ steps.build_args.outputs.args }}
            VERSION=${{ steps.version.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}:cache,mode=max

      - name: Summary
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "## ${{ matrix.image }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${IMAGE_TAGS}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${IMAGE_DIGEST}\`" >> $GITHUB_STEP_SUMMARY

  # ── Mirror to GitHub + Create Release ───────────────────────────────────
  push-to-github:
    name: Mirror to GitHub + Create Release
    runs-on: ubuntu-latest
    needs: [check-frontend, check-backend, check-rust, build-tauri-linux]
    if: ${{ (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && success() }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2
        with:
          fetch-depth: 0

      - name: Mirror branch + tag to GitHub
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.MIRROR_REPO }}
        run: |
          git fetch --tags
          if git remote | grep -q "^github$"; then
            git remote set-url github "https://x-access-token:${MIRROR_TOKEN}@github.com/${MIRROR_REPO}.git"
          else
            git remote add github "https://x-access-token:${MIRROR_TOKEN}@github.com/${MIRROR_REPO}.git"
          fi
          git push github HEAD:refs/heads/main --force
          git push github "${GITHUB_REF}" --tags --force

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: vinyl-vault-linux-appimage
          path: dist/

      - name: Create GitHub Release and upload AppImage
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.MIRROR_REPO }}
        run: |
          TAG="${{ github.ref_name }}"
          APPIMAGE=$(find dist/ -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then exit 1; fi
          
          APPIMAGE_NAME=$(basename "$APPIMAGE")
          sha256sum "$APPIMAGE" > SHA256SUMS.txt

          BODY="### Install\n\n**Linux (x86_64)** - download the \`.AppImage\` below:\n\`\`\`bash\nchmod +x Vinyl.Vault_*.AppImage\n./Vinyl.Vault_*.AppImage\n\`\`\`\n\n**macOS (Apple Silicon)** - download the \`.dmg\`, open it, drag to Applications.\n\n---"
          PAYLOAD=$(jq -n --arg tag "$TAG" --arg name "Vinyl Vault $TAG" --arg body "$BODY" '{tag_name: $tag, name: $name, body: $body, generate_release_notes: true}')

          RESP=$(curl -s -o /tmp/release.json -w "%{http_code}" -X POST -H "Authorization: Bearer ${MIRROR_TOKEN}" -H "Content-Type: application/json" "https://api.github.com/repos/${MIRROR_REPO}/releases" -d "$PAYLOAD")
          if [ "$RESP" = "422" ]; then
            RELEASE_ID=$(curl -s -H "Authorization: Bearer ${MIRROR_TOKEN}" "https://api.github.com/repos/${MIRROR_REPO}/releases/tags/${TAG}" | jq -r '.id')
          else
            RELEASE_ID=$(jq -r '.id' /tmp/release.json)
          fi

          upload() {
            curl -s -X POST -H "Authorization: Bearer ${MIRROR_TOKEN}" -H "Content-Type: $3" "https://uploads.github.com/repos/${MIRROR_REPO}/releases/${RELEASE_ID}/assets?name=$2" --data-binary @"$1"
          }
          upload "$APPIMAGE" "$APPIMAGE_NAME" "application/octet-stream"
          upload SHA256SUMS.txt "SHA256SUMS.txt" "text/plain"

  # ── Tauri Linux AppImage ──────────────────────────────────────────────────
  build-tauri-linux:
    name: Build Tauri Linux AppImage
    runs-on: ubuntu-latest
    needs: [check-frontend, check-backend, check-rust]
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-build-${{ hashFiles('vinylRecognizerDashboard/pnpm-lock.yaml', 'vinyl-catalog/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-build-

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo registry
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-build-reg-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-reg-

      - name: Cache cargo target
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: vinyl-catalog/src-tauri/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Install Linux system deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf file python3 python3-pip python3-venv libpython3.10 xdg-utils
          apt-get clean
          rm -rf /var/lib/apt/lists/*

      - name: Install Next.js deps
        working-directory: vinylRecognizerDashboard
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI deps
        working-directory: vinyl-catalog
        run: pnpm install --frozen-lockfile

      - name: Build Python sidecar
        working-directory: vinyl-catalog/sidecar
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet -r requirements.txt pyinstaller
          .venv/bin/pyinstaller --clean --onefile --name sidecar --distpath ../src-tauri/binaries main.py
          mv ../src-tauri/binaries/sidecar ../src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu

      - name: Build Tauri AppImage
        working-directory: vinyl-catalog
        env:
          AUTHENTIK_ISSUER: ${{ secrets.AUTHENTIK_ISSUER }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_BUNDLE_GSTREAMER: '0'
        run: pnpm tauri build --target x86_64-unknown-linux-gnu

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: vinyl-vault-linux-appimage
          path: vinyl-catalog/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          retention-days: 30
