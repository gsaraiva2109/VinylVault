name: Build Linux

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality Gate ──────────────────────────────────────────────────────────
  # Frontend lint + typecheck, backend typecheck/build, cargo check.
  # All downstream jobs are blocked on this passing.
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('vinylRecognizerDashboard/pnpm-lock.yaml', 'vinyl-catalog/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ── Next.js frontend ────────────────────────────────────────────────
      - name: Install Next.js deps
        working-directory: vinylRecognizerDashboard
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: vinylRecognizerDashboard
        run: pnpm lint

      - name: TypeScript check
        working-directory: vinylRecognizerDashboard
        run: pnpm exec tsc --noEmit

      # ── Backend API ─────────────────────────────────────────────────────
      - name: Install backend deps
        working-directory: vinyl-catalog/backend
        run: npm ci

      - name: Backend typecheck
        working-directory: vinyl-catalog/backend
        run: npx tsc --noEmit

      - name: Backend build
        working-directory: vinyl-catalog/backend
        run: npm run build

      # ── Rust / Tauri ────────────────────────────────────────────────────
      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Install Linux system deps for cargo check
        run: |
          apt-get update
          apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          apt-get clean
          rm -rf /var/lib/apt/lists/*

      - name: Create dummy sidecar for cargo check
        run: |
          mkdir -p vinyl-catalog/src-tauri/binaries
          touch vinyl-catalog/src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu
          chmod +x vinyl-catalog/src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu

      - name: Cargo check
        working-directory: vinyl-catalog/src-tauri
        env:
          AUTHENTIK_ISSUER: ${{ secrets.AUTHENTIK_ISSUER }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          # Route debug artifacts to /tmp — keeps workspace disk free
          CARGO_TARGET_DIR: /tmp/cargo-target
          # Limit linker parallelism to avoid SIGBUS under memory pressure
          CARGO_BUILD_JOBS: '2'
        run: cargo check --no-default-features

  # ── Docker Build & Push ───────────────────────────────────────────────────
  # Builds and pushes vinyl-vault-api and vinyl-vault-web images to GHCR.
  # Uses BuildX + registry cache for fast incremental builds.
  # DATABASE_URL is NEVER passed — no CI/CD DB connections.
  build-and-push-images:
    name: Build & Push — ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: quality-gate

    strategy:
      fail-fast: false
      matrix:
        include:
          - context: vinyl-catalog/backend
            image: vinyl-vault-api
            has_api_url: 'false'
          - context: vinylRecognizerDashboard
            image: vinyl-vault-web
            has_api_url: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Determine version type
        id: version_type
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" =~ -(beta|alpha|rc)\. ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_OWNER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && steps.version_type.outputs.is_prerelease == 'false' }}
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/v') && steps.version_type.outputs.is_prerelease == 'true' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Resolve build args
        id: build_args
        run: |
          if [ "${{ matrix.has_api_url }}" = "true" ]; then
            echo "args=NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ steps.build_args.outputs.args }}
            VERSION=${{ steps.version.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}:cache,mode=max

      - name: Summary
        run: |
          echo "## ${{ matrix.image }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.meta.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ── Auto Version & Tag ───────────────────────────────────────────────────
  # On every successful main build:
  #   1. Reads latest vX.Y.Z git tag as the version source of truth
  #   2. Inspects conventional commits since last tag to pick major/minor/patch
  #   3. Skips if computed tag already exists (safe to retry)
  #   4. Updates VERSION file, commits [skip ci], pushes tag
  #   5. Creates a Forgejo release with a generated changelog
  # The tag push fires a second pipeline run which:
  #   • publishes :latest + :vX.Y.Z to GHCR  → Dokploy can deploy
  #   • mirrors the tag to GitHub             → triggers release-macos.yml (.dmg)
  # Requires: FORGEJO_BOT_TOKEN secret (repo write access on Forgejo).
  auto-release:
    name: Auto Version & Tag
    runs-on: ubuntu-latest
    needs: [quality-gate, build-and-push-images, build-tauri-linux]
    if: >-
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip ci]')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.FORGEJO_BOT_TOKEN }}

      - name: Determine version bump
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v*' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
          [ -z "$LATEST_TAG" ] && LATEST_TAG="v0.0.0"
          CURRENT=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
          BUMP="patch"
          echo "$COMMITS" | grep -qE '^(feat!:|fix!:|BREAKING CHANGE:)' && BUMP="major"
          echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'                  && [ "$BUMP" != "major" ] && BUMP="minor"

          case "$BUMP" in
            major) NEW="$((MAJOR + 1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR + 1)).0" ;;
            *)     NEW="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "version=${NEW}"          >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${CURRENT} → ${NEW} (${BUMP})"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update VERSION, tag, and create release
        if: steps.check.outputs.exists == 'false'
        env:
          FORGEJO_BOT_TOKEN: ${{ secrets.FORGEJO_BOT_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LATEST_TAG="${{ steps.version.outputs.latest_tag }}"

          # Changelog from commits since last tag (before version bump commit)
          CHANGELOG=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"- %s" 2>/dev/null || echo "- Initial release")

          # Update VERSION file
          echo "$VERSION" > VERSION
          git config user.email "ci-bot@noreply.local"
          git config user.name "CI Bot"
          PROTOCOL="${GITHUB_SERVER_URL%%://*}"
          SERVER="${GITHUB_SERVER_URL#*//}"
          git remote set-url origin "${PROTOCOL}://x-access-token:${FORGEJO_BOT_TOKEN}@${SERVER}/${GITHUB_REPOSITORY}.git"
          git add VERSION
          git commit -m "chore: bump version to v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"

          # Create Forgejo release via API
          curl -s -X POST "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -H "Authorization: token ${FORGEJO_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg tag  "v${VERSION}" \
              --arg name "Release v${VERSION}" \
              --arg body "$CHANGELOG" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')"

  # ── Mirror to GitHub ─────────────────────────────────────────────────────
  # Only runs after quality gate passes. Pushes the current commit (and tag,
  # if this is a release) to GitHub, which triggers release-macos.yml for
  # the macOS .dmg build. Requires MIRROR_TOKEN secret and
  # MIRROR_REPO variable ("gsaraiva2109/vinylvault") configured on Forgejo.
  push-to-github:
    name: Mirror to GitHub
    runs-on: ubuntu-latest
    needs: [quality-gate, build-and-push-images, build-tauri-linux, auto-release]
    # Run even when auto-release is skipped (tag pushes), fail fast on any real failure
    if: >-
      always() &&
      needs.quality-gate.result == 'success' &&
      needs.build-and-push-images.result == 'success' &&
      needs.build-tauri-linux.result == 'success' &&
      (needs.auto-release.result == 'success' || needs.auto-release.result == 'skipped')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror branch + tag to GitHub
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.MIRROR_REPO }}
        run: |
          git fetch --tags
          git remote add github "https://x-access-token:${MIRROR_TOKEN}@github.com/${MIRROR_REPO}.git"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Tag push: mirror the tag (|| true — may already exist from branch-triggered run)
            git push github "${GITHUB_REF}" || true
          else
            # Branch push: mirror commit + push the version tag auto-release just created
            git push github HEAD:refs/heads/main
            LATEST_TAG=$(git tag -l 'v*' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
            if [ -n "$LATEST_TAG" ]; then
              git push github "refs/tags/${LATEST_TAG}"
            fi
          fi

  # ── Tauri Linux AppImage ──────────────────────────────────────────────────
  # Compiles the full Tauri desktop app for Linux x86_64, including the
  # Python OCR sidecar. Artifact stored on Forgejo for 30 days.
  build-tauri-linux:
    name: Build Tauri Linux AppImage
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('vinylRecognizerDashboard/pnpm-lock.yaml', 'vinyl-catalog/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      # ── System deps ───────────────────────────────────────────────────────
      - name: Install Linux system deps
        run: |
          apt-get update
          apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file \
            python3 \
            python3-pip \
            python3-venv \
            libpython3.10 \
            xdg-utils
          apt-get clean
          rm -rf /var/lib/apt/lists/*

      # ── Frontend + Tauri deps ─────────────────────────────────────────────
      - name: Install Next.js deps
        working-directory: vinylRecognizerDashboard
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI deps
        working-directory: vinyl-catalog
        run: pnpm install --frozen-lockfile

      # ── Python OCR sidecar ────────────────────────────────────────────────
      - name: Build Python sidecar
        working-directory: vinyl-catalog/sidecar
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet -r requirements.txt pyinstaller
          .venv/bin/pyinstaller --clean --onefile --name sidecar \
            --distpath ../src-tauri/binaries main.py
          mv ../src-tauri/binaries/sidecar \
             ../src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu

      # ── Tauri build ───────────────────────────────────────────────────────
      - name: Build Tauri AppImage
        working-directory: vinyl-catalog
        env:
          AUTHENTIK_ISSUER: ${{ secrets.AUTHENTIK_ISSUER }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Skip bundling GStreamer media drivers — not needed for this app
          APPIMAGE_BUNDLE_GSTREAMER: '0'
        run: pnpm tauri build --target x86_64-unknown-linux-gnu

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v3
        with:
          name: vinyl-vault-linux-appimage
          path: vinyl-catalog/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          retention-days: 30
