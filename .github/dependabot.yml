version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/vinyl-catalog"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/vinyl-catalog/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "backend"
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/vinylRecognizerDashboard"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "frontend"
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      all:
        patterns:
          - "*"
