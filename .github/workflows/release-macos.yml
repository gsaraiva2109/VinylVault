name: Release macOS

# Triggered when Forgejo mirrors the tag to GitHub.
# The GitHub Release + Linux AppImage are already created by Forgejo's
# push-to-github job before this tag arrives. This job just builds the
# .dmg and uploads it to that existing release.
on:
  push:
    tags:
      - "v*"
  # Fired explicitly by the Forgejo push-to-github job via the GitHub API
  # when GitHub suppresses the push trigger from the mirror token.
  repository_dispatch:
    types: [release-macos]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri-macos:
    name: Build & Upload macOS .dmg
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: latest

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            vinyl-catalog/pnpm-lock.yaml
            vinylRecognizerDashboard/pnpm-lock.yaml

      # aarch64-apple-darwin targets Apple Silicon (macos-latest is arm64).
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-build-macos-${{ hashFiles('vinyl-catalog/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-macos-

      - name: Install Next.js deps
        working-directory: vinylRecognizerDashboard
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI deps
        working-directory: vinyl-catalog
        run: pnpm install --frozen-lockfile

      - name: Fix Next.js static export for Tauri
        run: |
          # Next.js 15 requires force-static for routes during static export.
          # macOS uses BSD sed, which requires an empty backup string (-i '') for in-place edits.
          sed -i '' 's/force-dynamic/force-static/' vinylRecognizerDashboard/app/api/auth/\[...nextauth\]/route.ts

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build Tauri macOS .dmg
        working-directory: vinyl-catalog
        env:
          AUTHENTIK_ISSUER: ${{ secrets.AUTHENTIK_ISSUER }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          NEXT_PUBLIC_SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          NEXT_PUBLIC_SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          APPLE_SIGNING_IDENTITY: "-"
        run: pnpm tauri build --target aarch64-apple-darwin --bundles dmg

      - name: Upload macOS App Artifact (Manual Triggers)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Tauri-App
          path: |
            vinyl-catalog/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            vinyl-catalog/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            vinyl-catalog/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

      - name: Wait for Release and Upload
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || github.ref_name }}"
          VERSION="${TAG#v}"

          BUNDLE_DIR="vinyl-catalog/src-tauri/target/aarch64-apple-darwin/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          UPDATER_TGZ=$(find "$BUNDLE_DIR/macos" -name "*.app.tar.gz" | head -1)
          UPDATER_SIG=$(find "$BUNDLE_DIR/macos" -name "*.app.tar.gz.sig" | head -1)

          shasum -a 256 "$DMG" > SHA256SUMS-macos.txt

          echo "Verifying release ${TAG} exists (created by semantic-release)..."
          for i in {1..3}; do
            if gh release view "$TAG" > /dev/null 2>&1; then
              echo "Release found!"
              gh release upload "$TAG" "$DMG" SHA256SUMS-macos.txt --clobber

              # Upload updater artifacts if present
              if [ -f "$UPDATER_TGZ" ] && [ -f "$UPDATER_SIG" ]; then
                gh release upload "$TAG" "$UPDATER_TGZ" "$UPDATER_SIG" --clobber

                # Patch latest.json to add darwin-aarch64 entry
                TGZ_NAME=$(basename "$UPDATER_TGZ")
                SIGNATURE=$(cat "$UPDATER_SIG")
                DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${TGZ_NAME}"

                gh release download "$TAG" --pattern "latest.json" --output latest.json 2>/dev/null || echo '{}' > latest.json

                jq --arg sig "$SIGNATURE" --arg url "$DOWNLOAD_URL" \
                  '.platforms["darwin-aarch64"] = {signature: $sig, url: $url}' \
                  latest.json > latest.json.tmp && mv latest.json.tmp latest.json

                echo "--- latest.json (after darwin-aarch64 merge) ---"
                cat latest.json

                gh release upload "$TAG" latest.json --clobber
              else
                echo "::warning::Updater artifacts (.app.tar.gz / .sig) not found — skipping darwin-aarch64 latest.json entry"
              fi

              exit 0
            fi
            echo "Release not found yet, retrying in 10s ($i/3)..."
            sleep 10
          done

          echo "::error::Release ${TAG} not found. Check that semantic-release completed on Forgejo."
          exit 1
