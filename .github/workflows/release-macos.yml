name: Release macOS

# Triggered by version tags pushed from Forgejo mirror sync or directly.
# Code arriving here has already passed Forgejo quality gates.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build Tauri macOS .dmg + attach to GitHub Release ────────────────────
  build-tauri-macos:
    name: Build & Release macOS .dmg
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            vinyl-catalog/pnpm-lock.yaml
            vinylRecognizerDashboard/pnpm-lock.yaml

      # aarch64-apple-darwin targets Apple Silicon (macos-latest is arm64).
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # Install deps separately so tauri-action can call beforeBuildCommand
      # (which runs `pnpm build` in vinylRecognizerDashboard/) without hitting
      # a missing lockfile. The Next.js build itself is NOT an explicit step —
      # tauri-action triggers it automatically via tauri.conf.json.
      - name: Install Next.js deps
        working-directory: vinylRecognizerDashboard
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI deps
        working-directory: vinyl-catalog
        run: pnpm install --frozen-lockfile

      # tauri-action will:
      #   1. Run beforeBuildCommand → builds Next.js → vinylRecognizerDashboard/out/
      #   2. Compile the Rust binary (Vision.framework interop included via macOS SDK)
      #   3. Bundle → .dmg and attach to the GitHub Release for this tag
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHENTIK_ISSUER: ${{ secrets.AUTHENTIK_ISSUER }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: vinyl-catalog
          tagName: ${{ github.ref_name }}
          releaseName: "Vinyl Vault ${{ github.ref_name }}"
          releaseBody: |
            ## Vinyl Vault ${{ github.ref_name }}

            ### Install (macOS — Apple Silicon)
            Download the `.dmg` below, open it, and drag **Vinyl Vault** to your Applications folder.

            > **Note:** The app is unsigned. On first launch, right-click → Open to bypass Gatekeeper.
          releaseDraft: false
          prerelease: false
          tauriScript: pnpm tauri
          args: --target aarch64-apple-darwin
