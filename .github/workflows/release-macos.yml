name: Release macOS

# Triggered when Forgejo mirrors the tag to GitHub.
# The GitHub Release + Linux AppImage are already created by Forgejo's
# push-to-github job before this tag arrives. This job just builds the
# .dmg and uploads it to that existing release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-tauri-macos:
    name: Build & Upload macOS .dmg
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            vinyl-catalog/pnpm-lock.yaml
            vinylRecognizerDashboard/pnpm-lock.yaml

      # aarch64-apple-darwin targets Apple Silicon (macos-latest is arm64).
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Next.js deps
        working-directory: vinylRecognizerDashboard
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI deps
        working-directory: vinyl-catalog
        run: pnpm install --frozen-lockfile

      # pnpm tauri build reads beforeBuildCommand from tauri.conf.json and
      # runs `cd ../vinylRecognizerDashboard && pnpm build` automatically.
      - name: Build Tauri macOS .dmg
        working-directory: vinyl-catalog
        env:
          AUTHENTIK_ISSUER: ${{ secrets.AUTHENTIK_ISSUER }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Upload .dmg and checksum to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find vinyl-catalog/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          shasum -a 256 "$DMG" > SHA256SUMS-macos.txt
          gh release upload "${{ github.ref_name }}" "$DMG" SHA256SUMS-macos.txt --clobber
