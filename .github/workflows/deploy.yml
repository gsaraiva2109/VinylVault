name: Deploy

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # ── CI checks ─────────────────────────────────────────────────────────────
  test-backend:
    name: Backend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vinyl-catalog/backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  test-electron:
    name: Electron — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vinyl-catalog
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: pnpm/action-setup@v5
        with:
          version: latest
      - name: Install Linux native deps
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  test-web:
    name: Web — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vinylRecognizerDashboard
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: pnpm/action-setup@v5
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # ── Build & push Docker images to GHCR ───────────────────────────────────
  build-api:
    name: Build image — API
    needs: [test-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vinyl-catalog-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: vinyl-catalog/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-web:
    name: Build image — Web
    needs: [test-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vinyl-catalog-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: vinylRecognizerDashboard
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ── Trigger Dokploy ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to Dokploy
    needs: [build-api, build-web, test-electron]
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Dokploy Redeploy
        run: curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"

      - name: Deployment summary
        run: |
          echo "## Deployed ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| \`vinyl-catalog-api\` | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`vinyl-catalog-web\` | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
