name: Auto Tag on CI Success

on:
  push:
    branches: [main]

concurrency:
  group: auto-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Run all CI checks ────────────────────────────────────────────────────
  test-backend:
    name: Backend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vinyl-catalog/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  test-electron:
    name: Electron — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vinyl-catalog
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install Linux native deps
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  test-web:
    name: Web — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vinylRecognizerDashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint || echo "Note: lint may not be configured"

  # ── Create/update 'latest' tag only if all CI passes ────────────────────
  tag:
    name: Create latest tag
    needs: [test-backend, test-electron, test-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for tag operations

      - name: Create or update 'latest' tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete old 'latest' tag if it exists
          git tag -d latest 2>/dev/null || true
          git push origin :latest 2>/dev/null || true

          # Create new 'latest' tag pointing to current commit
          git tag -a latest -m "Auto-tagged on successful CI"
          git push origin latest

      - name: Trigger deployment
        run: |
          echo "✅ All CI checks passed"
          echo "📦 'latest' tag created/updated"
          echo "🚀 Deployment workflow will trigger automatically"
