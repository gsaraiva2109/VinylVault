name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Build Tauri AppImage + create GitHub Release ──────────────────────────
  release-tauri:
    name: Build & Release AppImage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── System deps for WebKitGTK / AppImage ─────────────────────────────
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      # ── Rust ─────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vinyl-catalog/src-tauri -> target

      # ── Node / pnpm ───────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            vinyl-catalog/pnpm-lock.yaml
            vinylRecognizerDashboard/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: vinylRecognizerDashboard
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI deps
        working-directory: vinyl-catalog
        run: pnpm install --frozen-lockfile

      # ── Python sidecar ────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: vinyl-catalog/sidecar/requirements.txt

      - name: Build Python sidecar
        working-directory: vinyl-catalog/sidecar
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet -r requirements.txt pyinstaller
          .venv/bin/pyinstaller --clean --onefile --name sidecar \
            --distpath ../src-tauri/binaries main.py
          mv ../src-tauri/binaries/sidecar \
             ../src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu

      # ── Build Tauri + publish release ─────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHENTIK_ISSUER: ${{ secrets.AUTHENTIK_ISSUER }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: vinyl-catalog
          tagName: ${{ github.ref_name }}
          releaseName: "Vinyl Catalog ${{ github.ref_name }}"
          releaseBody: |
            ## Vinyl Catalog ${{ github.ref_name }}

            ### Install
            Download the `.AppImage` below, make it executable and run:
            ```bash
            chmod +x Vinyl.Catalog_*.AppImage
            ./Vinyl.Catalog_*.AppImage
            ```
          releaseDraft: false
          prerelease: false
          tauriScript: pnpm tauri
